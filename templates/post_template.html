<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} — Jeevan Kumar</title>
    <link rel="icon" href="../assets/cool.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <meta property="og:title" content="{{title}} — Jeevan Kumar">
    <meta property="og:description" content="{{description}}">
    <meta property="og:image" content="https://www.jeevan.life/assets/cool.png">
    <meta property="og:url" content="https://www.jeevan.life/posts/{{slug}}.html">
    <meta property="og:type" content="article">
    <meta name="twitter:image" content="https://www.jeevan.life/assets/cool.png">
    <meta name="twitter:card" content="summary_large_image">
</head>

<body>

    <header>
        <div class="header-content">
            <h1>Jeevan Kumar</h1>
        </div>
    </header>

    <div class="container">
        <a href="../index.html" class="read-more" style="margin-bottom: 20px;">← Back to Blog</a>

        <article class="post">
            <h2>{{title}}</h2>
            <span class="post-date">{{date}}</span>

            <div class="post-content">
                {{content}}
            </div>
        </article>
    </div>

    <footer>
        <p>Blog by Jeevan</p>
        <p>Contact: <a href="mailto:bettercalljeevan@gmail.com">bettercalljeevan@gmail.com</a></p>
    </footer>

    <div id="image-overlay">
        <img src="" alt="Fullscreen preview">
    </div>

    <script src="../js/script.js"></script>
</body>

</html>
